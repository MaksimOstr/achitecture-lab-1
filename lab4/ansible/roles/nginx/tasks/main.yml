---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Render nginx reverse proxy configuration
  ansible.builtin.template:
    src: mywebapp-nginx.conf.j2
    dest: /etc/nginx/sites-available/mywebapp
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Enable mywebapp nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/mywebapp
    dest: /etc/nginx/sites-enabled/mywebapp
    state: link
  notify: Restart nginx

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
