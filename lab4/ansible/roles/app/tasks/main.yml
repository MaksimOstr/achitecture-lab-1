---
- name: Install Java runtime
  ansible.builtin.apt:
    name:
      - openjdk-21-jre-headless
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure application system user exists
  ansible.builtin.user:
    name: "{{ app_system_user }}"
    system: true
    home: "{{ app_root }}"
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ app_root }}", owner: "{{ app_system_user }}", group: "{{ app_system_user }}", mode: "0755" }
    - { path: "{{ app_current_dir }}", owner: "{{ app_system_user }}", group: "{{ app_system_user }}", mode: "0755" }
    - { path: "{{ app_config_dir }}", owner: root, group: "{{ app_system_user }}", mode: "0750" }
    - { path: "{{ app_log_dir }}", owner: "{{ app_system_user }}", group: "{{ app_system_user }}", mode: "0755" }

- name: Copy application JAR
  ansible.builtin.copy:
    src: "{{ app_jar_path }}"
    dest: "{{ app_current_dir }}/mywebapp.jar"
    owner: "{{ app_system_user }}"
    group: "{{ app_system_user }}"
    mode: "0644"
  notify: Restart mywebapp

- name: Render application configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ app_config_dir }}/config.yaml"
    owner: root
    group: "{{ app_system_user }}"
    mode: "0640"
  notify: Restart mywebapp

- name: Install mywebapp systemd unit
  ansible.builtin.template:
    src: mywebapp.service.j2
    dest: /etc/systemd/system/mywebapp.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart mywebapp

- name: Install operator control wrapper
  ansible.builtin.template:
    src: mywebappctl.j2
    dest: /usr/local/bin/mywebappctl
    owner: root
    group: root
    mode: "0755"

- name: Ensure operator user exists on worker
  ansible.builtin.user:
    name: operator
    shell: /bin/bash
    create_home: true
    password: "{{ lab_default_password | password_hash('sha512', 'lab4operator') }}"

- name: Install restricted operator sudoers file
  ansible.builtin.template:
    src: operator-sudoers.j2
    dest: /etc/sudoers.d/operator-mywebapp
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Flush service handlers before health checks
  ansible.builtin.meta: flush_handlers

- name: Ensure mywebapp service is enabled and running
  ansible.builtin.systemd:
    name: mywebapp
    enabled: true
    state: started

- name: Wait for application readiness
  ansible.builtin.uri:
    url: "http://{{ app_bind_address }}:{{ app_port }}/health/ready"
    status_code: 200
  register: app_ready
  retries: 30
  delay: 2
  until: app_ready.status == 200
