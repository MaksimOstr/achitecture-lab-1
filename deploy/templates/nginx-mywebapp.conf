server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/mywebapp.access.log;
    error_log /var/log/nginx/mywebapp.error.log;

    location = / {
        proxy_pass http://127.0.0.1:5200;
        include proxy_params;
    }

    location /notes {
        proxy_pass http://127.0.0.1:5200;
        include proxy_params;
    }

    location /notes/ {
        proxy_pass http://127.0.0.1:5200;
        include proxy_params;
    }

    location / {
        return 404;
    }
}
