services:
  postgres:
    image: postgres:17
    container_name: mywebapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mywebapp
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: mywebapp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mywebapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp -d mywebapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mywebapp-web
    restart: unless-stopped
    environment:
      MYWEBAPP_SERVER_ADDRESS: 0.0.0.0
      MYWEBAPP_SERVER_PORT: 5200
      MYWEBAPP_DB_URL: jdbc:postgresql://postgres:5432/mywebapp
      MYWEBAPP_DB_USERNAME: mywebapp
      MYWEBAPP_DB_PASSWORD: mywebapp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mywebapp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5200/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: mywebapp-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/templates/nginx-mywebapp-docker.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mywebapp-net

volumes:
  postgres-data:

networks:
  mywebapp-net:
    driver: bridge
