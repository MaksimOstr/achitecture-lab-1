spring:
  application:
    name: mywebapp
  config:
    import: optional:file:/etc/mywebapp/config.yaml
  datasource:
    url: ${MYWEBAPP_DB_URL:jdbc:postgresql://127.0.0.1:5432/mywebapp}
    username: ${MYWEBAPP_DB_USERNAME:mywebapp}
    password: ${MYWEBAPP_DB_PASSWORD:mywebapp}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
server:
  address: ${MYWEBAPP_SERVER_ADDRESS:127.0.0.1}
  port: ${MYWEBAPP_SERVER_PORT:5200}
mywebapp:
  migrate-only: ${MYWEBAPP_MIGRATE_ONLY:false}
